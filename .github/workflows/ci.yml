name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [lint, typecheck, test, test-integration]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.8

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install TypeScript workspace deps
        run: pnpm install --frozen-lockfile

      - name: Install Python dev deps
        run: uv sync --project sdk-python --group dev

      - name: Sync Go workspaces
        run: go work sync

      - name: Run target
        run: make ${{ matrix.target }}
