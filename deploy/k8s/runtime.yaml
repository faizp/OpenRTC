apiVersion: apps/v1
kind: Deployment
metadata:
  name: openrtc-runtime
  namespace: openrtc
  labels:
    app.kubernetes.io/name: openrtc-runtime
    app.kubernetes.io/component: runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: openrtc-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openrtc-runtime
    spec:
      containers:
        - name: runtime
          image: openrtc:latest
          command: ["/usr/local/bin/openrtc-runtime"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: openrtc-config
            - secretRef:
                name: openrtc-auth
          env:
            - name: OPENRTC_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: openrtc-runtime
  namespace: openrtc
  annotations:
    # Sticky sessions required — configure your ingress accordingly.
    # For nginx ingress:
    #   nginx.ingress.kubernetes.io/affinity: "cookie"
    #   nginx.ingress.kubernetes.io/session-cookie-name: "openrtc-sticky"
spec:
  selector:
    app.kubernetes.io/name: openrtc-runtime
  ports:
    - port: 8080
      targetPort: http
      name: http
