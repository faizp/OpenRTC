apiVersion: apps/v1
kind: Deployment
metadata:
  name: openrtc-admin
  namespace: openrtc
  labels:
    app.kubernetes.io/name: openrtc-admin
    app.kubernetes.io/component: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openrtc-admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openrtc-admin
    spec:
      containers:
        - name: admin
          image: openrtc:latest
          command: ["/usr/local/bin/openrtc-admin"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: openrtc-config
            - secretRef:
                name: openrtc-auth
          env:
            - name: OPENRTC_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: openrtc-admin
  namespace: openrtc
spec:
  selector:
    app.kubernetes.io/name: openrtc-admin
  ports:
    - port: 8080
      targetPort: http
      name: http
