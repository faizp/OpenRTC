apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openrtc
  namespace: openrtc
  annotations:
    # Sticky sessions are required for WebSocket connections.
    # Adjust annotations for your ingress controller.
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "openrtc-sticky"
    nginx.ingress.kubernetes.io/session-cookie-expires: "86400"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support
    nginx.ingress.kubernetes.io/websocket-services: "openrtc-runtime"
spec:
  ingressClassName: nginx
  rules:
    - host: openrtc.example.com
      http:
        paths:
          # WebSocket runtime
          - path: /ws
            pathType: Exact
            backend:
              service:
                name: openrtc-runtime
                port:
                  number: 8080
          # Runtime health/metrics (optional exposure)
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: openrtc-runtime
                port:
                  number: 8080
          # Admin API
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: openrtc-admin
                port:
                  number: 8080
